name: Feature request
description: Suggest an improvement.
title: "feature: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion. Please keep the request focused and actionable.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
