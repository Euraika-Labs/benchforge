name: Feature request
description: Suggest an improvement to BenchForge.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is blocked or painful?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the desired behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Local models
        - Cloud providers
        - Benchmark packs
        - Results and reports
        - Worker harnesses
        - Packaging and onboarding
        - Security and sandboxing
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Include provider names, runtime names, benchmark suite links, or screenshots when useful.
