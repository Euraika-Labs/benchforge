name: Bug report
description: Report a reproducible BenchForge problem.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Include the target type, benchmark pack, and commands or UI steps.
      placeholder: |
        1. Start the app with make dev
        2. Add target ...
        3. Run pack ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "macOS version, CPU architecture"
  - type: textarea
    id: logs
    attributes:
      label: Logs or Readiness Summary
      description: Redact secrets before attaching logs or report exports.
      render: text
