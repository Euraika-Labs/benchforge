id: llm-structured-output
name: LLM Structured Output
version: 0.1.0
description: Judge-free checks for comparing local and cloud models on strict JSON, nested extraction, schema repair, and safe structured refusal.
tags: [prompt, llm, structured-output, json, comparison]
estimated_runtime: 5-12 minutes
requires_sandbox: false
calibration:
  status: pilot
  sample_size: 0
  last_reviewed: "2026-07-08"
  review_scope: contract_review
  quality_gates:
    - local_cloud_baseline_pair
    - provider_confirmed_model_identity
    - complete_pack_task_coverage
    - min_3_repetitions_per_task_target
    - cost_metrics_for_cloud_targets
    - single_generation_policy
    - review_before_public_leaderboard
  notes: Reviewed structured-output contracts for first-pass local/cloud comparison; not empirically calibrated against public baselines.
tasks:
  - tasks/schema-extraction.yaml
  - tasks/nested-tool-call.yaml
  - tasks/array-normalization.yaml
  - tasks/schema-repair.yaml
  - tasks/refusal-envelope.yaml
  - tasks/numeric-unit-conversion.yaml
