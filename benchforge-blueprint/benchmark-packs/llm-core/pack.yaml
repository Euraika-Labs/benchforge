id: llm-core
name: LLM Core
version: 0.1.0
description: Broader prompt-only checks for judge-free local and cloud LLM comparison.
tags: [prompt, llm, fast, core]
estimated_runtime: 3-8 minutes
requires_sandbox: false
calibration:
  status: pilot
  sample_size: 0
  last_reviewed: "2026-07-08"
  review_scope: contract_review
  quality_gates:
    - local_cloud_baseline_pair
    - provider_confirmed_model_identity
    - complete_pack_task_coverage
    - min_3_repetitions_per_task_target
    - cost_metrics_for_cloud_targets
    - single_generation_policy
    - review_before_public_leaderboard
  notes: Reviewed judge-free prompt contracts for first-pass local/cloud comparison; not empirically calibrated against public baselines.
tasks:
  - tasks/classification.yaml
  - tasks/extraction.yaml
  - tasks/arithmetic.yaml
  - tasks/tool-call-shape.yaml
  - tasks/boundary-handling.yaml
  - tasks/concise-synthesis.yaml
