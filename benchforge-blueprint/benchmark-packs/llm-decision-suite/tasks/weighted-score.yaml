id: llm-decision-weighted-score-001
name: Weighted score calculation
version: 0.1.0
type: prompt
weight: 1.25
prompt: |
  Return only compact JSON with fields selected_model_id, scores, explanation.

  Score = pass_rate * 0.60 + json_validity * 0.25 + latency_score * 0.15.
  latency_score is 1.0 when p95_latency_ms <= 700, 0.7 when <= 1000, otherwise 0.4.

  Models:
  - alpha: pass_rate 0.91, json_validity 0.98, p95_latency_ms 620
  - beta: pass_rate 0.95, json_validity 0.97, p95_latency_ms 940
  - gamma: pass_rate 0.93, json_validity 0.99, p95_latency_ms 760
timeout_seconds: 120
scoring:
  expect_json: true
  json_field_equals:
    selected_model_id: alpha
  json_field_number_close:
    scores.alpha:
      expected: 0.941
      tolerance: 0.0001
    scores.beta:
      expected: 0.9175
      tolerance: 0.0001
    scores.gamma:
      expected: 0.9105
      tolerance: 0.0001
  json_field_contains:
    explanation:
      - alpha
      - highest
