id: github-copilot-cli-byok-ollama
name: GitHub Copilot CLI BYOK via Ollama
kind: cli_agent
adapter_version: 1
schema_version: 1
command: copilot
args:
  - -p
  - "{{prompt}}"
  - -s
  - --no-ask-user
  - --allow-tool=read,write,shell
working_dir: "{{workspace}}"
timeout_seconds: 900
env:
  COPILOT_PROVIDER_BASE_URL: http://localhost:11434/v1
  COPILOT_PROVIDER_TYPE: openai
  COPILOT_PROVIDER_API_KEY: ""
  COPILOT_MODEL: "{{model}}"
capabilities:
  text_generation: true
  streaming: true
  tool_calling: true
  json_mode: false
  file_editing: true
  shell_execution: true
  repo_agent: true
security:
  sandbox_required: true
  network_required: local
validation:
  command_args:
    - help
metadata:
  docs: https://docs.github.com/en/copilot/how-tos/copilot-cli/customize-copilot/use-byok-models
